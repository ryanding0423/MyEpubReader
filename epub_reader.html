<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简 ODH 阅读器 (自动书签版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <style>
        /* 全局样式 */
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f4f4f4; font-family: "Segoe UI", "Microsoft YaHei", sans-serif; }
        
        /* 顶部控制栏 */
        #controls { padding: 10px 20px; background: #333; color: #fff; display: flex; align-items: center; gap: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10; flex-shrink: 0; }
        
        /* 文件上传按钮美化 */
        #file-input { display: none; }
        .btn { background: #555; border: 1px solid #777; color: white; padding: 6px 15px; cursor: pointer; border-radius: 4px; font-size: 14px; transition: background 0.2s; user-select: none; }
        .btn:hover { background: #666; border-color: #999; }
        
        /* 阅读器主体：允许纵向滚动 */
        #viewer { flex: 1; width: 100%; height: 100%; overflow-y: auto; background: #fff; scroll-behavior: smooth; }
        
        /* 书名显示 */
        .title-display { color: #aaa; font-size: 14px; margin-left: auto; max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* 提示框样式 */
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; opacity: 0; transition: opacity 0.5s; pointer-events: none; z-index: 100; }
    </style>
</head>
<body>
    <div id="controls">
        <label for="file-input" class="btn">📂 打开 EPUB</label>
        <input type="file" id="file-input" accept=".epub">
        <div class="btn" id="reset-btn" style="display:none;">⏮️ 重读</div>
        <div class="title-display" id="book-title">未加载书籍</div>
    </div>
    
    <div id="viewer"></div>
    <div id="toast"></div>

    <script>
        var book = ePub();
        var rendition;
        var currentBookKey = ""; // 用于存储当前书籍的唯一标识（文件名）

        // 简单的提示框函数
        function showToast(message) {
            var toast = document.getElementById('toast');
            toast.innerText = message;
            toast.style.opacity = 1;
            setTimeout(function() { toast.style.opacity = 0; }, 3000);
        }

        document.getElementById('file-input').addEventListener('change', function(e){
            var file = e.target.files[0];
            if (window.FileReader && file) {
                // 生成书籍唯一Key（使用 ODH_前缀 + 文件名）
                currentBookKey = "ODH_BOOKMARK_" + file.name;
                
                var reader = new FileReader();
                reader.onload = function(e) {
                    book.open(e.target.result);
                    
                    // --- 渲染设置 ---
                    rendition = book.renderTo("viewer", {
                        width: "100%",
                        height: "100%",
                        flow: "scrolled",
                        manager: "continuous",
                        allowScriptedContent: true
                    });

                    // --- 关键逻辑：检查是否有存档 ---
                    var savedLocation = localStorage.getItem(currentBookKey);
                    if (savedLocation) {
                        rendition.display(savedLocation); // 有存档，跳到存档位置
                        showToast("已自动跳转到上次阅读位置");
                    } else {
                        rendition.display(); // 无存档，从头开始
                    }
                    
                    // 显示“重读”按钮
                    document.getElementById('reset-btn').style.display = 'block';

                    // --- 关键逻辑：监听位置变化并自动保存 ---
                    rendition.on('relocated', function(location) {
                        // 存入 localStorage
                        localStorage.setItem(currentBookKey, location.start.cfi);
                    });

                    // 获取书名
                    book.loaded.metadata.then(function(meta) {
                        document.getElementById('book-title').innerText = meta.title || file.name;
                    });

                    // 注入样式优化
                    rendition.hooks.content.register(function(contents) {
                        contents.addStylesheetRules({
                            "body": { 
                                "font-family": "'Microsoft YaHei', sans-serif !important",
                                "font-size": "18px !important",
                                "line-height": "1.8 !important",
                                "padding": "40px 15% !important",
                                "max-width": "900px !important",
                                "margin": "0 auto !important"
                            },
                            "img": { "max-width": "100% !important" },
                            "p": { "margin-bottom": "1em !important" }
                        });
                    });
                };
                reader.readAsArrayBuffer(file);
            }
        });

        // --- “重读”按钮逻辑 ---
        document.getElementById('reset-btn').addEventListener('click', function() {
            if (rendition) {
                rendition.display(0); // 跳回第0页
                localStorage.removeItem(currentBookKey); // 清除存档
                showToast("已回到书籍开头");
            }
        });
    </script>
</body>
</html>
